<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Semantic Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #58a6ff; }
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .search-bar input { flex: 1; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: #e2e8f0; font-size: 1rem; }
  .search-bar input:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.2); }
  .search-bar button { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: #238636; color: white; cursor: pointer; font-size: 0.9rem; }
  .search-bar button:hover { background: #2ea043; }
  .mode-select { padding: 0.75rem; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: #e2e8f0; }
  .results { display: flex; flex-direction: column; gap: 1rem; }
  .result { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1rem; }
  .result:hover { border-color: #58a6ff; }
  .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
  .result-name { font-weight: 600; font-size: 0.95rem; color: #e2e8f0; }
  .result-score { font-size: 0.8rem; color: #7d8590; background: #21262d; padding: 0.2rem 0.5rem; border-radius: 12px; }
  .result-caption { font-size: 0.85rem; color: #8b949e; margin: 0.25rem 0; line-height: 1.4; }
  .result-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .tag { font-size: 0.7rem; background: #1f6feb22; color: #58a6ff; padding: 0.2rem 0.5rem; border-radius: 12px; border: 1px solid #1f6feb44; }
  .result-location { font-size: 0.8rem; color: #7d8590; margin-top: 0.3rem; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: #58a6ff; }
  .stat-label { font-size: 0.75rem; color: #7d8590; margin-top: 0.25rem; }
  .status { font-size: 0.85rem; color: #7d8590; margin: 1rem 0; }
  .error { color: #f85149; }
  .empty { color: #7d8590; text-align: center; padding: 2rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🔍 Vault Semantic Search</h1>
  <div style="font-size:0.75rem;color:#7d8590;margin-bottom:1rem;">
    Cloud Run: <a href="https://vault-search-338789220059.us-central1.run.app" style="color:#58a6ff">vault-search</a>
  </div>

  <div class="stats" id="stats"></div>

  <div class="search-bar">
    <input type="text" id="q" placeholder="Search bookmarks... (e.g. food, mumbai fashion, beach travel)" onkeydown="if(event.key==='Enter')search()">
    <select id="mode" class="mode-select">
      <option value="auto">Semantic (CLIP)</option>
      <option value="keyword">Keyword</option>
      <option value="semantic">CLIP only</option>
    </select>
    <button onclick="search()">Search</button>
  </div>

  <div id="status" class="status"></div>
  <div id="results" class="results"></div>
</div>

<script>
var API = 'https://vault-search-338789220059.us-central1.run.app';

async function load() {
  try {
    var r = await fetch(API + '/stats');
    var d = await r.json();
    document.getElementById('stats').innerHTML = 
      '<div class="stat"><div class="stat-value">' + d.total + '</div><div class="stat-label">Total posts</div></div>' +
      '<div class="stat"><div class="stat-value">' + d.has_location + '</div><div class="stat-label">With locations</div></div>' +
      '<div class="stat"><div class="stat-value">' + (d.has_transformers ? '✓' : '✗') + '</div><div class="stat-label">CLIP available</div></div>' +
      '<div class="stat"><div class="stat-value">' + d.clip_vectors + '</div><div class="stat-label">CLIP vectors</div></div>';
  } catch(e) {
    document.getElementById('stats').innerHTML = '<p class="error">API not reachable. Start with: python3 serve_vault_search.py</p>';
  }
}

async function search() {
  var q = document.getElementById('q').value.trim();
  var mode = document.getElementById('mode').value;
  var el = document.getElementById('status');
  var out = document.getElementById('results');
  if (!q) { el.textContent = ''; return; }
  el.textContent = 'Searching...';
  try {
    var r = await fetch(API + '/search?q=' + encodeURIComponent(q) + '&k=10&mode=' + mode);
    var d = await r.json();
    el.textContent = d.total + ' results';
    if (!d.results || d.results.length === 0) {
      out.innerHTML = '<div class="empty">No results for "' + q + '"</div>';
      return;
    }
    out.innerHTML = d.results.map(function(r) {
      return '<div class="result">' +
        '<div class="result-header">' +
          '<span class="result-name">' + (r.name || r.caption || r.id || '').substring(0,80) + '</span>' +
          '<span class="result-score">★ ' + r.score.toFixed(2) + '</span>' +
        '</div>' +
        '<div class="result-caption">' + (r.colabSummary || r.caption || '') + '</div>' +
        (r.location ? '<div class="result-location">📍 ' + r.location + '</div>' : '') +
        (r.vlTags && r.vlTags.length ? '<div class="result-tags">' + r.vlTags.slice(0,5).map(function(t){return '<span class="tag">'+t+'</span>'}).join('') + '</div>' : '') +
      '</div>';
    }).join('');
  } catch(e) {
    el.textContent = 'Error: ' + e.message;
  }
}

load();
</script>
</body>
</html>
